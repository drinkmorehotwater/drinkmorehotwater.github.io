<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欢乐刮刮乐</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7f7f7;
            --card-bg: #fff;
            --text-color: #333;
            --grid-gap: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        p {
            margin-bottom: 15px;
            color: #666;
            text-align: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            font-weight: bold;
            outline: none;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
        }

        /* 刮刮卡网格 */
        .scratch-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--grid-gap);
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1; /* 正方形网格 */
            margin-bottom: 20px;
        }

        .scratch-cell {
            position: relative;
            background-color: #eee;
            border-radius: 8px;
            overflow: hidden;
            /* 保持正方形 */
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            user-select: none;
        }

        .scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none; /* 防止触摸滚动 */
        }

        /* 结果弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        #message-area {
            margin-top: 10px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div class="balance-container">
                <span>余额: </span>
                <span id="balance">100</span>
                <span> 元</span>
            </div>
        </header>

        <main>
            <div id="start-screen" class="screen active">
                <h1>欢乐刮刮乐</h1>
                <p>每张卡片 10 元</p>
                <p>集齐 3 个相同金额即可中奖！</p>
                <button id="buy-btn" class="btn primary">购买一张 (10元)</button>
            </div>

            <div id="game-screen" class="screen">
                <div class="scratch-grid" id="grid">
                    <!-- 9个格子将通过JS动态生成 -->
                </div>
                <div id="message-area">
                    请刮开所有覆盖层...
                </div>
            </div>
        </main>

        <div id="result-modal" class="modal">
            <div class="modal-content">
                <h2 id="result-title">中奖啦！</h2>
                <p id="result-amount">获得 50 元</p>
                <button id="close-modal-btn" class="btn">收下奖励</button>
            </div>
        </div>
    </div>

    <script>
        class ScratchCard {
            constructor(elementId, value, onReveal) {
                this.container = document.getElementById(elementId);
                this.value = value;
                this.onReveal = onReveal;
                this.isRevealed = false;
                
                // 创建内容层
                this.content = document.createElement('div');
                this.content.className = 'scratch-content';
                this.content.innerText = value > 0 ? `¥${value}` : '谢谢';
                this.content.style.position = 'absolute';
                this.content.style.zIndex = '1';
                this.content.style.width = '100%';
                this.content.style.height = '100%';
                this.content.style.display = 'flex';
                this.content.style.alignItems = 'center';
                this.content.style.justifyContent = 'center';
                this.content.style.fontSize = '1.2rem';
                this.content.style.fontWeight = 'bold';
                this.content.style.color = value > 0 ? '#ff6b6b' : '#999';
                
                // 创建遮罩层 Canvas
                this.canvas = document.createElement('canvas');
                this.canvas.className = 'scratch-canvas';
                this.canvas.style.zIndex = '2';
                
                this.container.innerHTML = '';
                this.container.appendChild(this.content);
                this.container.appendChild(this.canvas);
                
                this.ctx = this.canvas.getContext('2d');
                this.initCanvas();
                this.bindEvents();
            }

            initCanvas() {
                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                
                // 填充灰色遮罩
                this.ctx.fillStyle = '#cccccc';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制文字 "刮开"
                this.ctx.fillStyle = '#999999';
                this.ctx.font = '14px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText('刮一刮', this.canvas.width / 2, this.canvas.height / 2);
                
                // 设置擦除模式
                this.ctx.globalCompositeOperation = 'destination-out';
            }

            bindEvents() {
                let isDrawing = false;
                
                const start = (e) => {
                    if (this.isRevealed) return;
                    isDrawing = true;
                    e.preventDefault(); // 防止滚动
                };
                
                const move = (e) => {
                    if (!isDrawing || this.isRevealed) return;
                    e.preventDefault();
                    
                    const rect = this.canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    const x = clientX - rect.left;
                    const y = clientY - rect.top;
                    
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 15, 0, Math.PI * 2); // 笔触大小
                    this.ctx.fill();
                };
                
                const end = () => {
                    if (!isDrawing) return;
                    isDrawing = false;
                    this.checkRevealed();
                };
                
                this.canvas.addEventListener('mousedown', start);
                this.canvas.addEventListener('touchstart', start, { passive: false });
                
                this.canvas.addEventListener('mousemove', move);
                this.canvas.addEventListener('touchmove', move, { passive: false });
                
                this.canvas.addEventListener('mouseup', end);
                this.canvas.addEventListener('touchend', end);
                this.canvas.addEventListener('mouseleave', end);
            }

            checkRevealed() {
                if (this.isRevealed) return;
                
                // 计算透明像素比例
                const imageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                const data = imageData.data;
                let transparentPixels = 0;
                
                for (let i = 3; i < data.length; i += 4) {
                    if (data[i] === 0) {
                        transparentPixels++;
                    }
                }
                
                const totalPixels = this.canvas.width * this.canvas.height;
                const percentage = (transparentPixels / totalPixels) * 100;
                
                if (percentage > 40) { // 超过40%就自动全部显示
                    this.reveal();
                }
            }

            reveal() {
                this.isRevealed = true;
                this.canvas.style.display = 'none'; // 隐藏遮罩
                if (this.onReveal) this.onReveal(this.value);
            }
        }

        class Game {
            constructor() {
                this.balance = 100;
                this.cost = 10;
                this.prizes = [0, 10, 20, 50, 100]; // 可能的奖金
                this.gridSize = 9;
                this.cards = [];
                this.revealedCount = 0;
                this.currentCardValues = [];
                
                this.ui = {
                    balance: document.getElementById('balance'),
                    startScreen: document.getElementById('start-screen'),
                    gameScreen: document.getElementById('game-screen'),
                    grid: document.getElementById('grid'),
                    buyBtn: document.getElementById('buy-btn'),
                    modal: document.getElementById('result-modal'),
                    modalTitle: document.getElementById('result-title'),
                    modalAmount: document.getElementById('result-amount'),
                    modalBtn: document.getElementById('close-modal-btn')
                };
                
                this.init();
            }

            init() {
                this.updateBalanceUI();
                this.ui.buyBtn.addEventListener('click', () => this.buyCard());
                this.ui.modalBtn.addEventListener('click', () => this.closeModal());
            }

            updateBalanceUI() {
                this.ui.balance.innerText = this.balance;
            }

            buyCard() {
                if (this.balance < this.cost) {
                    alert('余额不足！');
                    return;
                }
                
                this.balance -= this.cost;
                this.updateBalanceUI();
                
                this.startNewGame();
            }

            startNewGame() {
                this.ui.startScreen.classList.remove('active');
                this.ui.gameScreen.classList.add('active');
                this.ui.gameScreen.style.display = 'flex'; // Ensure flex display
                this.ui.startScreen.style.display = 'none';

                this.generateCardData();
                this.renderGrid();
            }

            generateCardData() {
                // 决定本次结果
                // 简单概率控制：
                // 50% 不中奖
                // 30% 中 10 元 (保本)
                // 15% 中 20 元
                // 4% 中 50 元
                // 1% 中 100 元
                
                const rand = Math.random();
                let winAmount = 0;
                
                if (rand < 0.5) winAmount = 0;
                else if (rand < 0.8) winAmount = 10;
                else if (rand < 0.95) winAmount = 20;
                else if (rand < 0.99) winAmount = 50;
                else winAmount = 100;
                
                this.currentWinAmount = winAmount;
                
                // 生成 9 个格子的数据
                // 如果中奖，必须至少有 3 个 winAmount
                // 如果不中奖，任何数字都不能出现 >= 3 次 (或者简单点，确保最大重复次数 < 3，除了0)
                
                this.currentCardValues = [];
                
                if (winAmount > 0) {
                    // 放入 3 个中奖数字
                    for (let i = 0; i < 3; i++) this.currentCardValues.push(winAmount);
                    // 填充剩余 6 个
                    for (let i = 0; i < 6; i++) {
                        let val = this.getRandomPrize(winAmount); // 避免再次生成 winAmount 导致 > 3 个 (其实 >3 个也没事，只要 >=3 就算中)
                        this.currentCardValues.push(val);
                    }
                } else {
                    // 输局：确保没有任意非0数字出现 >= 3 次
                    // 简单策略：随机填充，检查，如果满足中奖条件则重试，直到生成不中奖的组合
                    // 或者：使用一个不会中奖的预设模式，再随机打乱
                    // 这里使用随机生成+检查的策略
                    let valid = false;
                    while (!valid) {
                        this.currentCardValues = [];
                        for (let i = 0; i < 9; i++) {
                            this.currentCardValues.push(this.getRandomPrize(-1));
                        }
                        if (this.checkWinFromValues(this.currentCardValues) === 0) {
                            valid = true;
                        }
                    }
                }
                
                // 打乱数组
                this.currentCardValues.sort(() => Math.random() - 0.5);
            }
            
            getRandomPrize(exclude) {
                // 返回一个随机奖项
                const p = this.prizes[Math.floor(Math.random() * this.prizes.length)];
                return p;
            }

            checkWinFromValues(values) {
                // 统计每个数字出现的次数
                const counts = {};
                for (let val of values) {
                    if (val > 0) {
                        counts[val] = (counts[val] || 0) + 1;
                    }
                }
                
                // 检查是否有 >= 3 的
                let maxWin = 0;
                for (let val in counts) {
                    if (counts[val] >= 3) {
                        if (parseInt(val) > maxWin) maxWin = parseInt(val);
                    }
                }
                return maxWin;
            }

            renderGrid() {
                this.ui.grid.innerHTML = '';
                this.cards = [];
                this.revealedCount = 0;
                
                this.currentCardValues.forEach((val, index) => {
                    const cell = document.createElement('div');
                    cell.className = 'scratch-cell';
                    cell.id = `cell-${index}`;
                    this.ui.grid.appendChild(cell);
                    
                    const card = new ScratchCard(`cell-${index}`, val, () => this.onCardReveal());
                    this.cards.push(card);
                });
            }

            onCardReveal() {
                this.revealedCount++;
                if (this.revealedCount === this.gridSize) {
                    setTimeout(() => this.settleGame(), 500);
                }
            }

            settleGame() {
                const winAmount = this.checkWinFromValues(this.currentCardValues);
                
                if (winAmount > 0) {
                    this.ui.modalTitle.innerText = '恭喜中奖！';
                    this.ui.modalAmount.innerText = `获得 ${winAmount} 元`;
                    this.balance += winAmount;
                } else {
                    this.ui.modalTitle.innerText = '很遗憾';
                    this.ui.modalAmount.innerText = '未中奖，再接再厉';
                }
                
                this.updateBalanceUI();
                this.ui.modal.classList.add('active');
                this.ui.modal.style.display = 'flex';
            }

            closeModal() {
                this.ui.modal.classList.remove('active');
                this.ui.modal.style.display = 'none';
                this.ui.gameScreen.classList.remove('active');
                this.ui.gameScreen.style.display = 'none';
                this.ui.startScreen.classList.add('active');
                this.ui.startScreen.style.display = 'flex';
            }
        }

        // 启动游戏
        window.addEventListener('DOMContentLoaded', () => {
            new Game();
        });
    </script>
</body>
</html>
