<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>战略讨论的最大问题</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                   Arial, sans-serif;
      background: #f7f8fa;
      margin: 0;
      padding: 0;
      color: #1f2329;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #646a73;
      margin-bottom: 32px;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }
    .card h2 {
      font-size: 22px;
      margin: 0 0 12px;
    }
    ul {
      padding-left: 20px;
      margin: 0;
    }
    li {
      line-height: 1.8;
    }
    .highlight {
      font-weight: 600;
      color: #1677ff;
    }
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #8f959e;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>战略讨论的最大问题</h1>
    <div class="subtitle">
      来自一次会议中的关键洞察
    </div>

    <div class="card">
      <h2>不是方向</h2>
      <ul>
        <li>大方向通常已经形成共识</li>
        <li>参与者对“要去哪里”并不存在根本分歧</li>
        <li>争论往往并非发生在战略目标本身</li>
      </ul>
    </div>

    <div class="card">
      <h2>而是 <span class="highlight">共识形成机制</span></h2>
      <ul>
        <li>对问题的理解不一致</li>
        <li>对优先级和取舍的判断不同</li>
        <li>关键假设停留在隐性层面</li>
        <li>缺乏清晰、可执行的决策规则</li>
      </ul>
    </div>

    <div class="card">
      <h2>一句话总结</h2>
      <p>
        当战略讨论陷入反复和拉扯，问题往往不在方向是否正确，
        而在于是否拥有一个能够真正对齐认知、沉淀决策的共识形成机制。
      </p>
    </div>

    <div class="footer">
      © 战略思考 · 思维记录
    </div>
  </div>
</body>
</html>
